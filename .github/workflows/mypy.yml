name: mypy
# Per-language type gate for the yolo-labz Python archetype (ruff + mypy).
# Initial tier is REPORT-ONLY: mypy runs on every PR and posts findings to the
# job summary, but `continue-on-error` keeps it non-blocking while the legacy
# type-debt baseline is burned down. Ratchet to blocking by deleting the
# `continue-on-error: true` line once `mypy` is clean (report-only -> block;
# never loosen). This is the GitHub-native report-only — NOT `|| true`.
on:
  pull_request:
    types: [opened, synchronize, reopened]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  mypy:
    name: mypy (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: '3.12'
      - name: mypy
        continue-on-error: true
        run: |
          if [ -d src ]; then TGT=src; else TGT=.; fi
          {
            echo '## mypy report (report-only — non-blocking initial tier)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          uvx mypy@2.1.0 --ignore-missing-imports --no-error-summary "$TGT" 2>&1 \
            | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
