name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    name: Lint (shellcheck + shfmt + ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install shell linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: shfmt check
        run: shfmt -d -i 0 -ci -bn $(find . -name '*.sh' -not -path './.git/*')
      - name: shellcheck
        run: shellcheck -x -o all -e SC2250,SC2312,SC2310 $(find . -name '*.sh' -not -path './.git/*')
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.2
      - name: Ruff check
        run: uvx ruff check skills/ scripts/
      - name: Ruff format check
        run: uvx ruff format --check skills/ scripts/

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v5.4.2
      - name: Pyright
        run: uvx pyright skills/classroom-submit/classroom.py

  smoke:
    name: Smoke test (py_compile + lint.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install shell linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Python compile check
        run: python3 -m py_compile skills/classroom-submit/classroom.py
      - name: Run lint.sh
        run: bash scripts/lint.sh
