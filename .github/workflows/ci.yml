name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  lint:
    name: Lint (shellcheck + shfmt + ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install shell linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: shfmt check
        run: shfmt -d -i 0 -ci -bn $(find . -name '*.sh' -not -path './.git/*')
      - name: shellcheck
        run: shellcheck -x -o all -e SC2250,SC2312,SC2310 $(find . -name '*.sh' -not -path './.git/*')
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Ruff check
        run: uvx ruff check skills/ scripts/
      - name: Ruff format check
        run: uvx ruff format --check skills/ scripts/

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Pyright
        run: uvx pyright skills/classroom-submit/classroom.py

  smoke:
    name: Smoke test (py_compile + lint.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install shell linters
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Python compile check
        run: python3 -m py_compile skills/classroom-submit/classroom.py
      - name: Run lint.sh
        run: bash scripts/lint.sh
