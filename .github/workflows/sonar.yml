# TODO: Provision SonarQube project on sonarqube.home301server.com.br:
#   1. Create project: yolo-labz_claude-classroom-submit
#   2. Generate PROJECT_ANALYSIS_TOKEN (scoped to this project key)
#   3. Set repo variable SONAR_HOST_URL = https://sonarqube.home301server.com.br
#   4. Set repo secret SONAR_TOKEN = <the project analysis token>

name: SonarQube scan

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions: {}

jobs:
  scan:
    name: SonarQube scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
      - name: Checkout (full history for blame-based coverage)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Skip if SonarQube not configured
        id: check
        env:
          HOST: ${{ vars.SONAR_HOST_URL }}
          TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$HOST" ] || [ -z "$TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SONAR_HOST_URL or SONAR_TOKEN not set — skipping Sonar scan."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: SonarQube scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
