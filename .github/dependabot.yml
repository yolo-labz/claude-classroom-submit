version: 2
updates:
  # GitHub Actions — the only ecosystem with deps to update (zero pip deps)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 10
